<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Buddy — Jacob Digital</title>
  <link rel="icon" href="../Brand/Favicon.png" />

  <link rel="stylesheet" href="./colors_and_type.css" />
  <link rel="stylesheet" href="app.css" />

  <style>
    .buddy-back-btn {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      background: #fff; border: 1px solid #D1D5DB; border-radius: 6px;
      padding: 8px 14px; font-family: 'Inter', sans-serif; font-size: 13px;
      color: #637080; text-decoration: none; transition: 0.18s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .buddy-back-btn:hover { border-color: #1586FC; color: #1586FC; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <a href="../index.html" class="buddy-back-btn" aria-label="Zurück zur Website">← Zurück zu Jacob Digital</a>
  <div id="app"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="screens-home.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" data-presets="react">
    function App() {
      const [route, setRoute] = React.useState(() => localStorage.getItem('aib-route') || 'home');
      const [selectedTool, setSelectedTool] = React.useState(null);
      const [seedPrompt, setSeedPrompt] = React.useState(null);

      React.useEffect(() => { localStorage.setItem('aib-route', route); }, [route]);

      function navigate(r) {
        setSelectedTool(null);
        setSeedPrompt(null);
        setRoute(r);
      }
      function openTool(id) {
        setSelectedTool(id);
        setRoute('tool-detail');
      }
      function openChat(prompt) {
        setSeedPrompt(prompt || null);
        setRoute('chat');
      }

      let screen;
      if (route === 'chat')       screen = <ChatScreen onNavigate={navigate} seedPrompt={seedPrompt} />;
      else if (route === 'tools') screen = <ToolsScreen onOpenTool={openTool} />;
      else if (route === 'compare') screen = <CompareScreen />;
      else if (route === 'finder') screen = <FinderScreen onOpenTool={openTool} onOpenChat={openChat} />;
      else if (route === 'tool-detail' && selectedTool) {
        screen = <ToolDetail
                   toolId={selectedTool}
                   onBack={() => navigate('tools')}
                   onOpenChat={openChat}
                 />;
      }
      else screen = <HomeScreen onNavigate={navigate} onOpenTool={openTool} />;

      const sbRoute = route === 'tool-detail' ? 'tools' : route;
      return (
        <div className="shell">
          <Sidebar route={sbRoute} onNavigate={navigate} />
          {screen}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
